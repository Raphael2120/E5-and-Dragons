sonar.projectKey=e5-and-dragons
sonar.projectName=E5 & Dragons
sonar.projectVersion=0.1.0

# ── Scala sources ──────────────────────────────────────────────────────────────
sonar.sources=\
  commons/src/main/scala,\
  core/exploration/src/main/scala,\
  core/combat/src/main/scala,\
  core/social-interaction/src/main/scala,\
  infra/src/main/scala,\
  app/end-game/src/main/scala

sonar.tests=\
  commons/src/test/scala,\
  core/exploration/src/test/scala,\
  core/combat/src/test/scala,\
  infra/src/test/scala

# Scoverage XML coverage reports (generated by sbt-scoverage)
sonar.scala.coverage.reportPaths=\
  commons/target/scala-3.7.3/scoverage-report/scoverage.xml,\
  core/exploration/target/scala-3.7.3/scoverage-report/scoverage.xml,\
  core/combat/target/scala-3.7.3/scoverage-report/scoverage.xml,\
  infra/target/scala-3.7.3/scoverage-report/scoverage.xml

# ── Frontend sources ───────────────────────────────────────────────────────────
sonar.javascript.sources=frontend/src
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ── General ────────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
sonar.exclusions=\
  **/target/**,\
  **/node_modules/**,\
  frontend/dist/**,\
  **/*.spec.ts
