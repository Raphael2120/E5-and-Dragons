services:

  backend:
    image: '${BACKEND_IMAGE:-e5-and-dragons/backend:latest}'
    pull_policy: always
    container_name: e5-dragons-backend
    environment:
      - JAVA_OPTS=-Xmx512m
    ports:
      - '8080:8080'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    image: '${FRONTEND_IMAGE:-e5-and-dragons/frontend:latest}'
    pull_policy: always
    container_name: e5-dragons-frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
