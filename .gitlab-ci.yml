stages:
  - security
  - build
  - scan
  - deploy

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
  BACKEND_IMAGE_LATEST: $CI_REGISTRY_IMAGE/backend:latest
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
  FRONTEND_IMAGE_LATEST: $CI_REGISTRY_IMAGE/frontend:latest
  DOCKER_TLS_CERTDIR: ""

# ── SECURITY — détection de secrets ──────────────────────────────────────────
gitleaks:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl
    - curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
      | tar -xz -C /usr/local/bin gitleaks
  script:
    - gitleaks detect --source . --verbose --config .gitleaks.toml
  only:
    - main

# ── BUILD — Docker build + push GitLab Registry ───────────────────────────────
build-backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f Dockerfile.backend -t $BACKEND_IMAGE -t $BACKEND_IMAGE_LATEST .
    - docker push $BACKEND_IMAGE
    - docker push $BACKEND_IMAGE_LATEST
  only:
    - main

build-frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f frontend/Dockerfile -t $FRONTEND_IMAGE -t $FRONTEND_IMAGE_LATEST ./frontend
    - docker push $FRONTEND_IMAGE
    - docker push $FRONTEND_IMAGE_LATEST
  only:
    - main

# ── SCAN — vulnérabilités sur les images buildées ────────────────────────────
trivy-backend:
  stage: scan
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
      | sh -s -- -b /usr/local/bin
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed $BACKEND_IMAGE
  only:
    - main
  needs: ["build-backend"]

trivy-frontend:
  stage: scan
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
      | sh -s -- -b /usr/local/bin
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed
      --skip-dirs /usr/local/lib/node_modules/npm $FRONTEND_IMAGE
  only:
    - main
  needs: ["build-frontend"]

# ── DEPLOY — webhook Coolify ─────────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      echo "WEBHOOK set=${COOLIFY_WEBHOOK:+yes}"
      echo "TOKEN set=${COOLIFY_TOKEN:+yes}"
      curl --fail -X GET "$COOLIFY_WEBHOOK" -H "Authorization: Bearer $COOLIFY_TOKEN"
  only:
    - main
  needs: ["trivy-backend", "trivy-frontend"]
