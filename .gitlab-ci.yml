stages:
  - test
  - sonarqube
  - docker-build
  - deploy

variables:
  SBT_OPTS: "-Xmx1g -Xms256m -XX:+UseG1GC"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# ── BACKEND TESTS ─────────────────────────────────────────────────────────────
test:backend:
  stage: test
  image: eclipse-temurin:25-jdk-noble
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl && rm -rf /var/lib/apt/lists/*
    - curl -fsSL "https://github.com/sbt/sbt/releases/download/v1.11.7/sbt-1.11.7.tgz"
      | tar xz -C /usr/local && ln -s /usr/local/sbt/bin/sbt /usr/local/bin/sbt
  script:
    - sbt clean coverage test coverageReport
  artifacts:
    reports:
      junit: "**/target/test-reports/*.xml"
    paths:
      - "**/target/scala-3.7.3/scoverage-report/"
    expire_in: 1 week
  cache:
    key: "$CI_PROJECT_ID-sbt-$CI_COMMIT_REF_SLUG"
    paths:
      - ~/.sbt/
      - ~/.ivy2/cache/
      - ~/.cache/coursier/

# ── FRONTEND TESTS ────────────────────────────────────────────────────────────
test:frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - apk add --no-cache chromium
    - export CHROME_BIN=/usr/bin/chromium-browser
    - cd frontend && npm ci --prefer-offline
  script:
    - npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
  artifacts:
    paths:
      - frontend/coverage/
    expire_in: 1 week
  cache:
    key: "$CI_PROJECT_ID-npm-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/

# ── SONARQUBE ─────────────────────────────────────────────────────────────────
sonarqube:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:11
  needs:
    - test:backend
    - test:frontend
  script:
    - sonar-scanner
      -Dsonar.host.url="$SONAR_HOST_URL"
      -Dsonar.token="$SONAR_TOKEN"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── DOCKER BUILD & PUSH ───────────────────────────────────────────────────────
.docker-base:
  stage: docker-build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

docker:backend:
  extends: .docker-base
  needs: ["test:backend"]
  script:
    - docker build -f Dockerfile.backend
        -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
        -t "$CI_REGISTRY_IMAGE/backend:latest" .
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"

docker:frontend:
  extends: .docker-base
  needs: ["test:frontend"]
  script:
    - docker build -f frontend/Dockerfile
        -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
        -t "$CI_REGISTRY_IMAGE/frontend:latest" ./frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"

# ── DEPLOY TO VPS (Coolify via SSH) ──────────────────────────────────────────
deploy:production:
  stage: deploy
  image: alpine:3.20
  needs:
    - docker:backend
    - docker:frontend
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$VPS_USER@$VPS_HOST" "
        cd /opt/e5-and-dragons &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        REGISTRY_IMAGE=$CI_REGISTRY_IMAGE docker compose pull &&
        REGISTRY_IMAGE=$CI_REGISTRY_IMAGE docker compose up -d --remove-orphans
      "
  environment:
    name: production
    url: "http://$VPS_HOST"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
